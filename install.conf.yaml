- defaults:
    link:
        create: true
        relink: true

- clean: ["~"]

- shell:
    - [git submodule update --init --recursive, Updating dependencies]
    - cp deps/vim-plug/plug.vim config/nvim/autoload/plug.vim
    -
      command: "command -q fzf; or dnf install fzf"
      stdin: true
      stdout: true
    -
      command: "command -q delta; or dnf install git-delta"
      stdin: true
      stdout: true
    -
      command: "command -q direnv; or dnf install direnv"
      stdin: true
      stdout: true
    -
      command: "command -q bat; or dnf install bat"
      stdin: true
      stdout: true
    -
      command: "command -q fd; or dnf install fd-find"
      stdin: true
      stdout: true
    -
      command: "command -q rg; or dnf install ripgrep"
      stdin: true
      stdout: true
    -
      command: "command -q starship; or dnf install starship"
      stdin: true
      stdout: true

- link:
    ~/.config/asdf: config/asdf
    ~/.config/dircolors: config/dircolors
    ~/.config/direnv: config/direnv
    ~/.config/fish: config/fish
    ~/.config/nvim: config/nvim
    ~/.config/starship.toml: config/starship.toml
    ~/.local/share/asdf-core: deps/asdf
    ~/.local/bin:
        glob: true
        path: local/bin/*
    ~/.tmux.conf:
    ~/.editorconfig:
    ~/.gitconfig:
    ~/.gitexcludes:
